<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CDKK - Booting...</title>

  <link rel="icon" type="image/x-icon" href="Assets\Favicon\favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="Assets\Favicon\favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="Assets\Favicon\favicon-16x16.png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root{
      --blue1:#8bc7ff;
      --blue2:#2f7ee6;
      --blue3:#1f5ea8;
      --ink:#071528;
      --ok:#21d07a;
      --warn:#ffd45a;
    }

    body{
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family: Tahoma, Verdana, Arial, sans-serif;
      color:#dff2ff;
      background:
        radial-gradient(circle at 15% 20%, rgba(108,180,255,.25) 0 2px, transparent 2px) 0 0/22px 22px,
        linear-gradient(180deg,#0b1f3d 0%, #123463 50%, #0b1f3d 100%);
      overflow:hidden;
    }

    body::before{
      content:"";
      position:fixed; inset:0; pointer-events:none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.04) 0px,
        rgba(255,255,255,.04) 1px,
        rgba(0,0,0,0) 2px,
        rgba(0,0,0,0) 4px
      );
    }

    .boot-wrap{
      width:min(920px, 94vw);
      border:2px solid #08284f;
      background: linear-gradient(180deg, rgba(255,255,255,.22) 0%, rgba(255,255,255,.06) 100%), #12335f;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.5), 0 16px 40px rgba(0,0,0,.45);
      border-radius:6px;
      overflow:hidden;
      animation: pop .5s ease-out;
    }

    @keyframes pop { from { opacity:0; transform:scale(.96) } to { opacity:1; transform:scale(1) } }

    .titlebar{
      background: linear-gradient(180deg, #6ab1ff 0%, #2f7ee6 65%, #225ea8 100%);
      color:#eaf6ff;
      padding:8px 12px;
      font-weight:700;
      font-size:13px;
      letter-spacing:.4px;
      border-bottom:1px solid #0b2f5c;
      text-shadow:0 1px 0 rgba(0,0,0,.4);
      display:flex; justify-content:space-between; align-items:center;
    }

    .winbtns{ display:flex; gap:6px; }
    .dot{ width:12px; height:12px; border:1px solid #083468; background:#cde6ff; }

    .content{
      display:grid;
      grid-template-columns: 1.1fr 1fr;
      gap:14px;
      padding:16px;
      background: linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.03)), #12335f;
    }

    .panel{
      border:1px solid #0c2f5d;
      background: linear-gradient(180deg, rgba(255,255,255,.78) 0%, rgba(219,232,247,.86) 100%);
      color:#102948;
      box-shadow: inset 0 1px 0 #fff, inset 0 -1px 0 rgba(0,0,0,.16);
      border-radius:4px;
      padding:12px;
    }

    .brand{
      display:flex; align-items:center; gap:12px; margin-bottom:12px;
    }
    .brand img{ width:64px; height:64px; filter: drop-shadow(0 0 8px rgba(47,126,230,.45)); }
    .brand h1{ font-size:24px; color:#0d3e7a; line-height:1.1; }
    .brand p{ font-size:12px; color:#476486; font-weight:700; }

    .progress-shell{
      margin:10px 0 8px;
      border:1px solid #0f2a4e;
      background:#f4f9ff;
      padding:3px;
      border-radius:2px;
    }

    .progress{
      height:16px;
      width:0%;
      background: repeating-linear-gradient(45deg, #8ec8ff 0 10px, #5da4f0 10px 20px);
      border:1px solid #1e63b0;
      transition: width .2s linear;
    }

    .status-row{
      display:flex; justify-content:space-between; align-items:center;
      font-size:12px; font-weight:700; color:#234a79;
    }

    .tasks{
      margin-top:8px;
      display:grid; gap:6px;
      font-size:12px;
    }
    .task{
      display:flex; align-items:center; gap:8px;
      border:1px solid #aac3dd;
      padding:6px 8px;
      background:#fff;
    }
    .led{
      width:10px; height:10px; border-radius:50%;
      background:#9aa8b8;
      box-shadow:0 0 0 1px rgba(0,0,0,.2) inset;
      flex-shrink:0;
    }
    .task.done .led{ background:var(--ok); box-shadow:0 0 8px rgba(33,208,122,.7); }
    .task.warn .led{ background:var(--warn); box-shadow:0 0 8px rgba(255,212,90,.7); }

    .console{
      height:280px;
      overflow:hidden;
      background:#061325;
      border:1px solid #0b315f;
      color:#9fd0ff;
      font-family: "Courier New", monospace;
      font-size:12px;
      padding:10px;
      line-height:1.45;
      border-radius:4px;
      box-shadow: inset 0 0 20px rgba(0,0,0,.6);
    }
    .console .ok{ color:#7dffbd; }
    .console .warn{ color:#ffd56c; }
    .console .info{ color:#9fd0ff; }

    .footer{
      border-top:1px solid #0b315f;
      background:linear-gradient(180deg,#18427a,#123462);
      color:#dff1ff;
      font-size:12px;
      padding:8px 12px;
      display:flex; justify-content:space-between; align-items:center;
    }

    .blink { animation: blink 1s steps(2,end) infinite; }
    @keyframes blink { 50% { opacity:0; } }

    .fade-out{ animation: fadeOut .55s ease forwards; }
    @keyframes fadeOut{ to { opacity:0; transform:scale(1.02); filter: blur(2px); } }

    @media (max-width: 840px){
      .content{ grid-template-columns:1fr; }
      .console{ height:180px; }
    }

    @media (prefers-reduced-motion: reduce){
      *{ animation:none !important; transition:none !important; }
    }
  </style>
</head>
<body>
  <div class="boot-wrap" id="bootWrap" role="status" aria-live="polite">
    <div class="titlebar">
      <span>CDKK System Loader v2.004</span>
      <div class="winbtns"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    </div>

    <div class="content">
      <section class="panel">
        <div class="brand">
          <img src="Assets/Image/cdkk_svg_blue.png" alt="CDKK logo">
          <div>
            <h1>CDKK Network</h1>
            <p>Initializing community services...</p>
          </div>
        </div>

        <div class="progress-shell"><div class="progress" id="bar"></div></div>
        <div class="status-row">
          <span id="statusText">Starting boot sequence...</span>
          <span id="percent">0%</span>
        </div>

        <div class="tasks">
          <div class="task"><span class="led"></span><span>Mounting file index</span></div>
          <div class="task"><span class="led"></span><span>Connecting forum services</span></div>
          <div class="task"><span class="led"></span><span>Loading downloads metadata</span></div>
          <div class="task"><span class="led"></span><span>Preparing homepage widgets</span></div>
          <div class="task warn"><span class="led"></span><span>Syncing retro theme assets</span></div>
        </div>
      </section>

      <section class="console" id="console"></section>
    </div>

    <div class="footer">
      <span>Press <strong>F5</strong> to reboot • Build 2004.26</span>
      <span>redirecting to next page<span class="blink">_</span></span>
    </div>
  </div>

  <script>
    const bootWrap = document.getElementById("bootWrap");
    const bar = document.getElementById("bar");
    const percent = document.getElementById("percent");
    const statusText = document.getElementById("statusText");
    const consoleEl = document.getElementById("console");
    const taskEls = [...document.querySelectorAll(".task")];

    const logs = [
      "[INFO] kernel: boot request accepted",
      "[INFO] fs: index mounted at /community",
      "[INFO] net: forum gateway handshake complete",
      "[INFO] cache: warmed trending content",
      "[WARN] media: instagram embed queued",
      "[INFO] ui: y2k profile loaded",
      "[INFO] route: target ready",
      "[ OK ] startup complete"
    ];

    const statusSteps = [
      "Starting boot sequence...",
      "Connecting to community network...",
      "Loading forum services...",
      "Syncing downloads...",
      "Rendering interface...",
      "Finalizing..."
    ];

    function getNextUrl() {
      const sp = new URLSearchParams(window.location.search);
      const rawNext = sp.get("next") || "index.html";
      let nextUrl;

      try {
        nextUrl = new URL(decodeURIComponent(rawNext), window.location.href);
      } catch {
        nextUrl = new URL("index.html", window.location.href);
      }

      if (nextUrl.origin !== window.location.origin) {
        nextUrl = new URL("index.html", window.location.href);
      }

      nextUrl.searchParams.set("booted", "1");
      return nextUrl.pathname + nextUrl.search + nextUrl.hash;
    }

    let p = 0;
    let logIndex = 0;
    let step = 0;
    let started = false;
    let loop;

    function addLog(line){
      const div = document.createElement("div");
      div.className = line.includes("[ OK ]") ? "ok" : line.includes("[WARN]") ? "warn" : "info";
      div.textContent = line;
      consoleEl.appendChild(div);
      consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    function tick(){
      p += Math.random() * 9 + 2;
      if (p > 100) p = 100;

      const val = Math.floor(p);
      bar.style.width = val + "%";
      percent.textContent = val + "%";

      const targetStep = Math.min(statusSteps.length - 1, Math.floor((val / 100) * statusSteps.length));
      if (targetStep !== step){
        step = targetStep;
        statusText.textContent = statusSteps[step];
      }

      const taskToComplete = Math.min(taskEls.length - 1, Math.floor((val / 100) * taskEls.length));
      for (let i = 0; i <= taskToComplete; i++) taskEls[i].classList.add("done");

      if (logIndex < logs.length && Math.random() > 0.35) addLog(logs[logIndex++]);

      if (val >= 100){
        statusText.textContent = "Boot complete.";
        while (logIndex < logs.length) addLog(logs[logIndex++]);
        clearInterval(loop);

        setTimeout(() => {
          bootWrap.classList.add("fade-out");
          setTimeout(() => { window.location.href = getNextUrl(); }, 520);
        }, 500);
      }
    }

    function startBoot(){
      if (started) return;
      started = true;
      addLog("[INFO] CDKK loader started");
      loop = setInterval(tick, 220);
    }

    window.addEventListener("load", startBoot);
    setTimeout(startBoot, 900);
  </script>
</body>
</html>
